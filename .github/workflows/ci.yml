name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Node 20 on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        if: runner.os != 'Windows'
        run: pnpm test

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pnpm exec vitest run --reporter=json --outputFile=vitest-results.json
          $testExit = $LASTEXITCODE
          if ($testExit -ne 0) {
            $failures = @()
            if (Test-Path vitest-results.json) {
              $results = Get-Content vitest-results.json -Raw | ConvertFrom-Json
              foreach ($suite in $results.testResults) {
                foreach ($assertion in $suite.assertionResults) {
                  if ($assertion.status -eq 'failed') {
                    $messages = $assertion.failureMessages -join "`n"
                    $failures += "$($suite.name) :: $($assertion.fullName)`n$messages"
                  }
                }
              }
            }
            $summary = if ($failures.Count) { $failures -join "`n`n" } else { 'Vitest failed without a failed assertion result.' }
            for ($offset = 0; $offset -lt $summary.Length; $offset += 3000) {
              $length = [Math]::Min(3000, $summary.Length - $offset)
              $part = $summary.Substring($offset, $length)
              $escaped = $part.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
              Write-Output "::error file=.github,title=Windows Vitest failure::$escaped"
            }
            exit $testExit
          }

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  package-install:
    name: Package install on Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Verify global tarball install
        run: pnpm test:package
